        ['Na','Sodium','alkali metal'], ['Mg','Magnesium','alkaline earth metal'], ['Al','Aluminium','post-transition metal'], ['Si','Silicon','metalloid'], ['P','Phosphorus','polyatomic nonmetal'], ['S','Sulfur','polyatomic nonmetal'], ['Cl','Chlorine','diatomic nonmetal'], ['Ar','Argon','noble gas'],
        ['K','Potassium','alkali metal'], ['Ca','Calcium','alkaline earth metal'], ['Sc','Scandium','transition metal'], ['Ti','Titanium','transition metal'], ['V','Vanadium','transition metal'], ['Cr','Chromium','transition metal'], ['Mn','Manganese','transition metal'], ['Fe','Iron','transition metal'], ['Co','Cobalt','transition metal'], ['Ni','Nickel','transition metal'], ['Cu','Copper','transition metal'], ['Zn','Zinc','transition metal'], ['Ga','Gallium','post-transition metal'], ['Ge','Germanium','metalloid'], ['As','Arsenic','metalloid'], ['Se','Selenium','polyatomic nonmetal'], ['Br','Bromine','diatomic nonmetal'], ['Kr','Krypton','noble gas'],
        ['Rb','Rubidium','alkali metal'], ['Sr','Strontium','alkaline earth metal'], ['Y','Yttrium','transition metal'], ['Zr','Zirconium','transition metal'], ['Nb','Niobium','transition metal'], ['Mo','Molybdenum','transition metal'], ['Tc','Technetium','transition metal'], ['Ru','Ruthenium','transition metal'], ['Rh','Rhodium','transition metal'], ['Pd','Palladium','transition metal'], ['Ag','Silver','transition metal'], ['Cd','Cadmium','transition metal'], ['In','Indium','post-transition metal'], ['Sn','Tin','post-transition metal'], ['Sb','Antimony','metalloid'], ['Te','Tellurium','metalloid'], ['I','Iodine','diatomic nonmetal'], ['Xe','Xenon','noble gas'],
        ['Cs','Caesium','alkali metal'], ['Ba','Barium','alkaline earth metal'], 
        ['La','Lanthanum','lanthanide'], ['Ce','Cerium','lanthanide'], ['Pr','Praseodymium','lanthanide'], ['Nd','Neodymium','lanthanide'], ['Pm','Promethium','lanthanide'], ['Sm','Samarium','lanthanide'], ['Eu','Europium','lanthanide'], ['Gd','Gadolinium','lanthanide'], ['Tb','Terbium','lanthanide'], ['Dy','Dysprosium','lanthanide'], ['Ho','Holmium','lanthanide'], ['Er','Erbium','lanthanide'], ['Tm','Thulium','lanthanide'], ['Yb','Ytterbium','lanthanide'], ['Lu','Lutetium','lanthanide'],

      ];

      const allElements = [];
      basicData.forEach((data, index) => {
        const num = index + 1;
        let row, col;

        if (num >= 57 && num <= 71) { row = 9; col = num - 57 + 4; }
        else if (num >= 89 && num <= 103) { row = 10; col = num - 89 + 4; }
        else {
          if (num === 1) { row = 1; col = 1; }
          else if (num === 2) { row = 1; col = 18; }
          else if (num >= 3 && num <= 4) { row = 2; col = num - 2; }
          else if (num >= 5 && num <= 10) { row = 2; col = num + 8; }
          else if (num >= 11 && num <= 12) { row = 3; col = num - 10; }
          else if (num >= 13 && num <= 18) { row = 3; col = num + 2; }
          else if (num >= 19 && num <= 36) { row = 4; col = num - 18; }
          else if (num >= 37 && num <= 54) { row = 5; col = num - 36; }
          else if (num >= 55 && num <= 56) { row = 6; col = num - 54; }
          else if (num >= 72 && num <= 86) { row = 6; col = num - 68; }
          else if (num >= 87 && num <= 88) { row = 7; col = num - 86; }
          else if (num >= 104 && num <= 118) { row = 7; col = num - 100; }
        }

        const custom = richData[num];
        const categoryNameZh = categoryStyles[data[2]]?.nameZh || '未知分類';
        const categoryNameEn = categoryStyles[data[2]]?.nameEn || 'Unknown';
        
        let realPeriod = row;
        let realGroup = col;
        if (num >= 57 && num <= 71) { realPeriod = 6; realGroup = 3; }
        if (num >= 89 && num <= 103) { realPeriod = 7; realGroup = 3; }

        allElements.push({
          num,
          sym: data[0],
          nameEn: data[1],
          nameZh: zhNames[data[0]] || data[1],
          cat: data[2],
          row: row + 1, col: col + 1,
          trends: getTrends(num, realPeriod, realGroup, data[2]),
          descZh: custom?.descZh || `屬於${categoryNameZh}。`,
          descEn: custom?.descEn || `Belongs to the ${categoryNameEn} category.`,
          exampleZh: custom?.exampleZh || `🔬 科學：這類元素在日常生活中較少直接接觸，通常用於特定的科學研究、工業合金或是人造放射性同位素實驗中。`,
          exampleEn: custom?.exampleEn || `🔬 Science: Less commonly encountered in daily life, typically used in specific scientific research or industrial alloys.`
        });
      });

      return allElements;
    };

    const elementsList = generateBaseElements();

    function App() {
      const [activeElement, setActiveElement] = useState(elementsList[0]);
      const [hoveredCategory, setHoveredCategory] = useState(null);
      const [isMobilePanelOpen, setIsMobilePanelOpen] = useState(false);
      const [lang, setLang] = useState('zh');
      const [trendMode, setTrendMode] = useState('category');

      const handleSelect = (el) => {
        setActiveElement(el);
        setIsMobilePanelOpen(true);
      };

      const toggleLang = () => {
        setLang(prev => prev === 'zh' ? 'en' : 'zh');
      };

      return (
        <div className="flex flex-col lg:flex-row h-screen w-full bg-[#0a0f18] text-gray-200 font-sans overflow-hidden">
          
          <div className="flex-1 flex flex-col h-full relative overflow-hidden">
            <header className="p-4 lg:p-6 flex justify-between items-center z-10 shrink-0">
              <div>
                <h1 className="text-xl lg:text-3xl font-extrabold tracking-wide text-white flex items-center gap-2 lg:gap-3">
                  <IconBeaker className="text-blue-400" size={28} />
                  {lang === 'zh' ? (
                    <>生活互動版 <span className="text-blue-400">元素週期表</span></>
                  ) : (
                    <>Interactive <span className="text-blue-400">Periodic Table</span></>
                  )}
                </h1>
                <p className="text-sm text-gray-400 mt-1 hidden md:block">
                  {lang === 'zh' 
                    ? '點擊任意元素，發掘它在現代科技與日常生活中的真實應用'

                  <button onClick={() => setTrendMode('category')} className={`px-2 py-1 text-xs font-medium rounded-md flex items-center gap-1 transition-colors ${trendMode === 'category' ? 'bg-gray-600 text-white shadow' : 'text-gray-400 hover:text-gray-200'}`}>
                    <IconLayers size={14} /> {lang === 'zh' ? '分類' : 'Groups'}
                  </button>
                  <button onClick={() => setTrendMode('radius')} className={`px-2 py-1 text-xs font-medium rounded-md flex items-center gap-1 transition-colors ${trendMode === 'radius' ? 'bg-cyan-600 text-white shadow' : 'text-gray-400 hover:text-gray-200'}`}>
                    <IconMaximize size={14} /> {lang === 'zh' ? '半徑' : 'Radius'}
                  </button>
                  <button onClick={() => setTrendMode('en')} className={`px-2 py-1 text-xs font-medium rounded-md flex items-center gap-1 transition-colors ${trendMode === 'en' ? 'bg-red-600 text-white shadow' : 'text-gray-400 hover:text-gray-200'}`}>
                    <IconFlame size={14} /> {lang === 'zh' ? '電負度' : 'EN'}
                  </button>
                  <button onClick={() => setTrendMode('ie')} className={`px-2 py-1 text-xs font-medium rounded-md flex items-center gap-1 transition-colors ${trendMode === 'ie' ? 'bg-yellow-600 text-white shadow' : 'text-gray-400 hover:text-gray-200'}`}>
                    <IconActivity size={14} /> {lang === 'zh' ? '游離能' : 'IE'}
                  </button>
                </div>

                <button onClick={toggleLang} className="flex items-center gap-1 lg:gap-2 px-2 py-1.5 lg:px-4 lg:py-2 bg-gray-800 hover:bg-gray-700 text-gray-200 rounded-lg border border-gray-600 transition-colors shadow-sm">
                  <IconGlobe size={16} className="text-blue-400" />
                  <span className="font-semibold text-xs lg:text-sm">{lang === 'zh' ? 'EN / 中文' : '中文 / EN'}</span>
                </button>
              </div>

                style={{ 
                  gridTemplateColumns: 'repeat(19, minmax(32px, 1fr))',
                  gridTemplateRows: 'repeat(12, minmax(32px, 1fr))'
                }}
              >
                {Array.from({length: 18}, (_, i) => (
                  <div key={`group-${i+1}`} className="flex items-end justify-center pb-1 text-gray-500 font-bold text-[10px] lg:text-xs" style={{ gridRow: 1, gridColumn: i + 2 }}>
                    {i + 1}
                  </div>
                ))}
                
                {Array.from({length: 7}, (_, i) => (
                  <div key={`period-${i+1}`} className="flex items-center justify-end pr-2 text-gray-500 font-bold text-[10px] lg:text-xs" style={{ gridRow: i + 2, gridColumn: 1 }}>

                <div className="flex items-center justify-end pr-2 text-rose-400/80 font-bold text-[10px] lg:text-xs text-right leading-tight" style={{ gridRow: 11, gridColumn: '2 / span 3' }}>
                  {lang === 'zh' ? '89-103 錒系' : '89-103 Actinides'}
                </div>

                {elementsList.map((el) => {
                  const isSelected = activeElement.num === el.num;
                  const isDimmed = hoveredCategory && hoveredCategory !== el.cat;
                  const styleObj = categoryStyles[el.cat] || categoryStyles['unknown'];
                  
                  let dynamicStyle = { gridRow: el.row, gridColumn: el.col };
                  let dynamicClass = `${styleObj.bg} ${styleObj.border}`;
                  
                  if (trendMode !== 'category' && el.trends) {
                    dynamicClass = 'border-gray-700 text-white';
                    let ratio = 0;
                    let baseColor = '50, 50, 50';

                    if (el.trends.radius !== 'N/A') {
                      if (trendMode === 'radius') { ratio = el.trends.radius / 350; baseColor = '6, 182, 212'; }
                      else if (trendMode === 'en' && el.trends.en !== '-') { ratio = parseFloat(el.trends.en) / 4.0; baseColor = '239, 68, 68'; }
                      else if (trendMode === 'ie') { ratio = el.trends.ie / 2500; baseColor = '234, 179, 8'; }
                    }
                    
                    const opacity = isDimmed ? 0.05 : (0.1 + ratio * 0.9);
                    dynamicStyle.backgroundColor = `rgba(${baseColor}, ${opacity})`;
                    dynamicStyle.borderColor = `rgba(${baseColor}, ${Math.max(0.3, opacity)})`;
                  }

                  return (
                    <button
                      key={el.num}
                      onClick={() => handleSelect(el)}
                      onMouseEnter={() => setHoveredCategory(el.cat)}
                      onMouseLeave={() => setHoveredCategory(null)}
                      style={dynamicStyle}
                      className={`

              <div className="mt-6 pt-5 border-t border-gray-700/50">
                 <div className="flex items-center gap-2 text-xs text-gray-500">
                   <IconInfo size={14} />

    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
